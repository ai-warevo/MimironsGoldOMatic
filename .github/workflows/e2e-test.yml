# Created: 2026-04-05 (Tier A E2E mocks)
# Updated: 2026-04-06 (Tier B closure + Tier C kick-off: job Summary performance table; see E2E_AUTOMATION_PLAN v1.9)
#
# Optimization / ops notes (Tier A + B):
# - NuGet: actions/cache on ~/.nuget/packages — key includes **/packages.lock.json (when present) + src/**/*.csproj hash for lockfile-less repos.
# - pip: cache ~/.cache/pip keyed by tier_b_verification/requirements.txt
# - Tier B adds two ASP.NET processes (9053, 9054) and a Python orchestrator; expect ~1–3 min additional wall time vs Tier A alone.
# - Helix base URL must be the mock root only (e.g. http://127.0.0.1:9053), not .../helix — relative path is helix/chat/messages.
# - Parallelism: this job must stay a single job (shared Postgres + fixed localhost ports). PRs also run unit-integration-tests.yml in parallel (separate workflow).
#
# Tier A: enrollment via MockEventSubWebhook → GET /api/pool/me
# Tier B: POST /api/e2e/prepare-pending-payout → SyntheticDesktop /run-sequence → MockHelix last-request → pool cleared
name: E2E Tier A+B (mocks)

on:
  pull_request:
    branches: [main]

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: "10.0.x"
  E2E_EVENTSUB_SECRET: e2e-ci-eventsub-secret
  E2E_API_KEY: ci-desktop-api-key

jobs:
  e2e-tier-a-b:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mgm
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/packages.lock.json') }}-${{ hashFiles('src/**/*.csproj') }}
          restore-keys: |
            nuget-${{ hashFiles('**/packages.lock.json') }}-
            nuget-

      - name: Cache pip (Tier B verification)
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('.github/scripts/tier_b_verification/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Restore and build (Backend + all E2E mocks)
        run: |
          set -e
          dotnet build src/MimironsGoldOMatic.Shared/MimironsGoldOMatic.Shared.csproj -c Release
          dotnet build src/Backend/MimironsGoldOMatic.Backend.Api/MimironsGoldOMatic.Backend.Api.csproj -c Release
          dotnet build src/Mocks/MockEventSubWebhook/MimironsGoldOMatic.Mocks.MockEventSubWebhook.csproj -c Release
          dotnet build src/Mocks/MockExtensionJwt/MimironsGoldOMatic.Mocks.MockExtensionJwt.csproj -c Release
          dotnet build src/Mocks/MockHelixApi/MimironsGoldOMatic.Mocks.MockHelixApi.csproj -c Release
          dotnet build src/Mocks/SyntheticDesktop/MimironsGoldOMatic.Mocks.SyntheticDesktop.csproj -c Release

      - name: Job timing (start)
        id: t0
        run: echo "E2E_JOB_START_SEC=$(date +%s)" >> "$GITHUB_ENV"

      - name: Install Tier B verification Python deps
        run: python3 -m pip install --user -r .github/scripts/tier_b_verification/requirements.txt

      - name: Start Backend (background)
        env:
          ASPNETCORE_ENVIRONMENT: Development
          ASPNETCORE_URLS: http://127.0.0.1:8080
          ConnectionStrings__PostgreSQL: Host=localhost;Port=5432;Database=mgm;Username=postgres;Password=postgres
          Mgm__ApiKey: ${{ env.E2E_API_KEY }}
          Mgm__DevSkipSubscriberCheck: "true"
          Mgm__EnableE2eHarness: "true"
          Twitch__EventSubSecret: ${{ env.E2E_EVENTSUB_SECRET }}
          Twitch__HelixApiBaseUrl: http://127.0.0.1:9053
          Twitch__BroadcasterAccessToken: e2e-ci-broadcast-token
          Twitch__BroadcasterUserId: e2e-ci-broadcaster
          Twitch__HelixClientId: e2e-ci-helix-client
        run: |
          set -e
          dotnet run --project src/Backend/MimironsGoldOMatic.Backend.Api/MimironsGoldOMatic.Backend.Api.csproj -c Release --no-build >> /tmp/mgm-backend.log 2>&1 &
          echo $! > /tmp/mgm-backend.pid
          echo "Waiting for Backend on :8080..."
          for i in $(seq 1 90); do
            if curl -s -o /dev/null --connect-timeout 2 http://127.0.0.1:8080/ 2>/dev/null; then
              echo "Backend accepting TCP/HTTP on :8080 (iteration $i)"
              break
            fi
            sleep 1
          done
          curl -s -o /dev/null --connect-timeout 2 http://127.0.0.1:8080/ || { echo "Backend failed to start"; exit 1; }

      - name: Start MockEventSubWebhook (background)
        env:
          ASPNETCORE_URLS: http://127.0.0.1:9051
          Backend__BaseUrl: http://127.0.0.1:8080
          Twitch__EventSubSecret: ${{ env.E2E_EVENTSUB_SECRET }}
        run: |
          set -e
          dotnet run --project src/Mocks/MockEventSubWebhook/MimironsGoldOMatic.Mocks.MockEventSubWebhook.csproj -c Release --no-build >> /tmp/mgm-mock-eventsub.log 2>&1 &
          echo $! > /tmp/mgm-mock-eventsub.pid
          for i in $(seq 1 60); do
            curl -sf http://127.0.0.1:9051/health >/dev/null && echo "MockEventSubWebhook healthy" && break
            sleep 1
          done
          curl -sf http://127.0.0.1:9051/health >/dev/null || { echo "MockEventSubWebhook failed to start"; exit 1; }

      - name: Start MockExtensionJwt (background)
        env:
          ASPNETCORE_URLS: http://127.0.0.1:9052
        run: |
          set -e
          dotnet run --project src/Mocks/MockExtensionJwt/MimironsGoldOMatic.Mocks.MockExtensionJwt.csproj -c Release --no-build >> /tmp/mgm-mock-jwt.log 2>&1 &
          echo $! > /tmp/mgm-mock-jwt.pid
          for i in $(seq 1 60); do
            curl -sf http://127.0.0.1:9052/health >/dev/null && echo "MockExtensionJwt healthy" && break
            sleep 1
          done
          curl -sf http://127.0.0.1:9052/health >/dev/null || { echo "MockExtensionJwt failed to start"; exit 1; }

      - name: Start MockHelixApi (background)
        env:
          ASPNETCORE_URLS: http://127.0.0.1:9053
        run: |
          set -e
          dotnet run --project src/Mocks/MockHelixApi/MimironsGoldOMatic.Mocks.MockHelixApi.csproj -c Release --no-build >> /tmp/mgm-mock-helix.log 2>&1 &
          echo $! > /tmp/mgm-mock-helix.pid
          for i in $(seq 1 60); do
            curl -sf http://127.0.0.1:9053/health >/dev/null && echo "MockHelixApi healthy" && break
            sleep 1
          done
          curl -sf http://127.0.0.1:9053/health >/dev/null || { echo "MockHelixApi failed to start"; exit 1; }

      - name: Start SyntheticDesktop (background)
        env:
          ASPNETCORE_URLS: http://127.0.0.1:9054
          Mgm__ApiKey: ${{ env.E2E_API_KEY }}
          SyntheticDesktop__BackendBaseUrl: http://127.0.0.1:8080
        run: |
          set -e
          dotnet run --project src/Mocks/SyntheticDesktop/MimironsGoldOMatic.Mocks.SyntheticDesktop.csproj -c Release --no-build >> /tmp/mgm-synthetic-desktop.log 2>&1 &
          echo $! > /tmp/mgm-synthetic-desktop.pid
          for i in $(seq 1 60); do
            curl -sf http://127.0.0.1:9054/health >/dev/null && echo "SyntheticDesktop healthy" && break
            sleep 1
          done
          curl -sf http://127.0.0.1:9054/health >/dev/null || { echo "SyntheticDesktop failed to start"; exit 1; }

      - name: Workflow integration probe (Tier A + B health)
        run: |
          set -e
          python3 .github/scripts/tier_b_verification/check_workflow_integration.py

      - name: Tier B verification scripts (MockHelix POST + SyntheticDesktop health)
        run: |
          set -e
          python3 .github/scripts/tier_b_verification/check_mockhelixapi.py
          python3 .github/scripts/tier_b_verification/check_syntheticdesktop.py

      - name: Send synthetic channel.chat.message via MockEventSubWebhook
        run: |
          set -e
          python3 .github/scripts/send_e2e_eventsub.py \
            --url http://127.0.0.1:9051 \
            --secret "${{ env.E2E_EVENTSUB_SECRET }}" \
            --user-id e2e-viewer-1 \
            --login e2eviewer1 \
            --text "!twgold Etoehero"

      - name: Verify pool enrollment (Extension JWT) — Tier A gate
        run: |
          set -e
          TOKEN=$(curl -sS "http://127.0.0.1:9052/token?userId=e2e-viewer-1&displayName=E2EViewer" | python3 -c "import json,sys; print(json.load(sys.stdin)['access_token'])")
          echo "Got JWT (${#TOKEN} chars)"
          BODY=$(curl -sS -H "Authorization: Bearer $TOKEN" http://127.0.0.1:8080/api/pool/me)
          echo "GET /api/pool/me => $BODY"
          python3 -c "import json,sys; d=json.loads(sys.argv[1]); assert d.get('isEnrolled') is True, d; assert d.get('characterName')=='Etoehero', d" "$BODY"
          echo "E2E Tier A: pool enrollment verified."

      - name: Tier B — full slice (harness, SyntheticDesktop, MockHelix, pool/me)
        run: |
          set -e
          echo "E2E_TIER_B_START_SEC=$(date +%s)" >> "$GITHUB_ENV"
          python3 .github/scripts/run_e2e_tier_b.py --api-key "${{ env.E2E_API_KEY }}" 2>&1 | tee /tmp/mgm-tier-b-orchestrator.log
          echo "E2E_TIER_B_END_SEC=$(date +%s)" >> "$GITHUB_ENV"

      - name: Job timing summary
        if: always()
        env:
          REPO: ${{ github.repository }}
        run: |
          END=$(date +%s)
          START="${E2E_JOB_START_SEC:-$END}"
          TOTAL=$((END - START))
          echo "E2E job wall-clock (approx): ${TOTAL}s (ubuntu runner; includes build + all services + Tier A + Tier B)"
          TB_START="${E2E_TIER_B_START_SEC:-}"
          TB_END="${E2E_TIER_B_END_SEC:-}"
          TB_DELTA=""
          if [ -n "$TB_START" ] && [ -n "$TB_END" ]; then
            TB_DELTA=$((TB_END - TB_START))
          fi
          {
            echo "## E2E performance (this run)"
            echo ""
            echo "| Segment | Seconds (approx.) |"
            echo "|---|---:|"
            echo "| Total job wall-clock | ${TOTAL} |"
            if [ -n "$TB_DELTA" ]; then
              echo "| Tier B step boundary (orchestrator step env timestamps) | ${TB_DELTA} |"
            else
              echo "| Tier B step boundary | *n/a (timestamps missing)* |"
            fi
            echo ""
            echo "**Workflow:** [\`e2e-test.yml\`](https://github.com/${REPO}/actions/workflows/e2e-test.yml) · **Insights:** [Actions metrics](https://github.com/${REPO}/actions/metrics/performance) (if enabled for this repo)."
            echo ""
            echo "Use the **five-run metrics** table in \`docs/e2e/E2E_AUTOMATION_PLAN.md\` (**Tier B: Implementation Complete**) for release audits."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Logs (on failure)
        if: failure()
        run: |
          echo "--- Backend PID ---"; cat /tmp/mgm-backend.pid 2>/dev/null || true
          echo "--- Try curl backend ---"; curl -v http://127.0.0.1:8080/ 2>&1 || true
          echo "--- MockHelixApi /last-request ---"; curl -sS http://127.0.0.1:9053/last-request 2>&1 || true
          echo "--- SyntheticDesktop /last-run ---"; curl -sS http://127.0.0.1:9054/last-run 2>&1 || true

      - name: Upload E2E service logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-service-logs
          if-no-files-found: warn
          retention-days: 14
          path: |
            /tmp/mgm-backend.log
            /tmp/mgm-mock-eventsub.log
            /tmp/mgm-mock-jwt.log
            /tmp/mgm-mock-helix.log
            /tmp/mgm-synthetic-desktop.log
            /tmp/mgm-tier-b-orchestrator.log
            /tmp/mgm-*.pid
