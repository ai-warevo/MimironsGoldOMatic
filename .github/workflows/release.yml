# Sequential release CI/CD: four parallel component builds → one GitHub Release + GHCR image.
#
# Optimization / ops notes:
# - NuGet / npm: caches below reduce cold restores; refresh cache keys when lockfiles or TFMs change materially.
# - Self-hosted runners: Windows agents can reduce queue time for WPF/Desktop or satisfy org policies; keep defaults portable.
# - Artifacts: upload-artifact retention-days trades GitHub storage vs forensic retention — align with org policy.
# - Future matrix: e.g. multiple RIDs for Desktop or multi-arch images once product supports it.
#
name: Release

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Semantic version without v prefix (e.g. 1.2.3). Leave empty to use v0.0.<run_number>.'
        required: false
        default: ''

# Listing only some scopes sets every other scope to "none". Artifacts need `actions`.
permissions:
  contents: write
  packages: write
  actions: write

concurrency:
  group: mimirons-release-${{ github.repository }}
  cancel-in-progress: false

env:
  DOTNET_VERSION: "10.0.x"

jobs:
  build-desktop:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve RELEASE_VERSION
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || '' }}
        run: |
          set -e
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "$INPUT_VERSION" ]; then
            V="${INPUT_VERSION#v}"
            echo "RELEASE_VERSION=v${V}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_VERSION=v0.0.${{ github.run_number }}" >> "$GITHUB_ENV"
          fi

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('src/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Publish Desktop (win-x64)
        run: >
          dotnet publish src/MimironsGoldOMatic.Desktop/MimironsGoldOMatic.Desktop.csproj
          -c Release -r win-x64 --self-contained false -p:PublishSingleFile=true
          -o "${{ runner.temp }}/mgm-desktop-publish"

      - name: Pack desktop ZIP with README.txt
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
        run: |
          $ErrorActionPreference = 'Stop'
          $pub = Join-Path $env:RUNNER_TEMP 'mgm-desktop-publish'
          $utc = (Get-Date).ToUniversalTime().ToString('o')
          $readme = @"
          Mimiron's Gold-o-Matic — Desktop (Windows)
          Version: $env:RELEASE_VERSION
          Commit: $env:GITHUB_SHA
          Repository: $env:GITHUB_REPOSITORY
          Built (UTC): $utc
          "@
          Set-Content -Path (Join-Path $pub 'README.txt') -Value $readme -Encoding utf8
          $zip = "MimironsGoldOMatic-Desktop-$env:RELEASE_VERSION-win.zip"
          if (Test-Path $zip) { Remove-Item $zip }
          Compress-Archive -Path (Join-Path $pub '*') -DestinationPath $zip

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-release
          path: MimironsGoldOMatic-Desktop-${{ env.RELEASE_VERSION }}-win.zip
          if-no-files-found: error
          retention-days: 90

  build-wowaddon:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve RELEASE_VERSION
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || '' }}
        run: |
          set -e
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "$INPUT_VERSION" ]; then
            V="${INPUT_VERSION#v}"
            echo "RELEASE_VERSION=v${V}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_VERSION=v0.0.${{ github.run_number }}" >> "$GITHUB_ENV"
          fi

      - name: Pack WoW addon ZIP with README.txt
        shell: bash
        env:
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
        run: |
          set -euo pipefail
          STAGE="${RUNNER_TEMP}/wow-addon-stage"
          ADDON_DIR="${STAGE}/MimironsGoldOMatic"
          rm -rf "${STAGE}"
          mkdir -p "${ADDON_DIR}"
          cp src/MimironsGoldOMatic.WoWAddon/MimironsGoldOMatic.Core.lua "${ADDON_DIR}/"
          cp src/MimironsGoldOMatic.WoWAddon/MimironsGoldOMatic.lua "${ADDON_DIR}/"
          cp src/MimironsGoldOMatic.WoWAddon/MimironsGoldOMatic.toc "${ADDON_DIR}/"
          UTC="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          {
            echo "Mimiron's Gold-o-Matic — WoW addon (3.3.5a)"
            echo "Version: ${RELEASE_VERSION}"
            echo "Commit: ${GITHUB_SHA}"
            echo "Repository: ${GITHUB_REPOSITORY}"
            echo "Built (UTC): ${UTC}"
            echo ""
            echo "Install: extract so the folder MimironsGoldOMatic/ (containing .toc and .lua) lives under Interface/AddOns/."
          } > "${STAGE}/README.txt"
          OUT="MimironsGoldOMatic-WoWAddon-${RELEASE_VERSION}.zip"
          rm -f "${OUT}"
          (cd "${STAGE}" && zip -r "${GITHUB_WORKSPACE}/${OUT}" MimironsGoldOMatic README.txt)

      - name: Upload WoW addon artifact
        uses: actions/upload-artifact@v4
        with:
          name: wow-addon-release
          path: MimironsGoldOMatic-WoWAddon-${{ env.RELEASE_VERSION }}.zip
          if-no-files-found: error
          retention-days: 90

  build-twitch-extension:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve RELEASE_VERSION
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || '' }}
        run: |
          set -e
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "$INPUT_VERSION" ]; then
            V="${INPUT_VERSION#v}"
            echo "RELEASE_VERSION=v${V}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_VERSION=v0.0.${{ github.run_number }}" >> "$GITHUB_ENV"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/MimironsGoldOMatic.TwitchExtension/package-lock.json

      - name: Install and build Twitch Extension
        working-directory: src/MimironsGoldOMatic.TwitchExtension
        run: |
          set -euo pipefail
          npm ci
          npm run build

      - name: Pack Twitch Extension ZIP with README.txt
        shell: bash
        env:
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
        run: |
          set -euo pipefail
          STAGE="${RUNNER_TEMP}/twitch-ext-stage"
          rm -rf "${STAGE}"
          mkdir -p "${STAGE}/dist"
          cp -r src/MimironsGoldOMatic.TwitchExtension/dist/. "${STAGE}/dist/"
          UTC="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          {
            echo "Mimiron's Gold-o-Matic — Twitch Extension (built output)"
            echo "Version: ${RELEASE_VERSION}"
            echo "Commit: ${GITHUB_SHA}"
            echo "Repository: ${GITHUB_REPOSITORY}"
            echo "Built (UTC): ${UTC}"
            echo ""
            echo "Contents: dist/ from npm run build (Vite). Host per Twitch Extension developer console requirements."
          } > "${STAGE}/README.txt"
          OUT="MimironsGoldOMatic-TwitchExtension-${RELEASE_VERSION}.zip"
          rm -f "${OUT}"
          (cd "${STAGE}" && zip -r "${GITHUB_WORKSPACE}/${OUT}" dist README.txt)

      - name: Upload Twitch Extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: twitch-extension-release
          path: MimironsGoldOMatic-TwitchExtension-${{ env.RELEASE_VERSION }}.zip
          if-no-files-found: error
          retention-days: 90

  build-backend-docker:
    runs-on: ubuntu-latest
    outputs:
      image_repo: ${{ steps.image.outputs.image_repo }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve RELEASE_VERSION
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || '' }}
        run: |
          set -e
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "$INPUT_VERSION" ]; then
            V="${INPUT_VERSION#v}"
            echo "RELEASE_VERSION=v${V}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_VERSION=v0.0.${{ github.run_number }}" >> "$GITHUB_ENV"
          fi

      - name: Compute GHCR image name (lowercase)
        id: image
        shell: bash
        run: |
          set -euo pipefail
          owner_lc="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "image_repo=ghcr.io/${owner_lc}/mimirons-goldomatic-backend" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Docker image (no push)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: src
          file: src/MimironsGoldOMatic.Backend/Dockerfile
          push: false
          tags: mimirons-goldomatic-backend:${{ env.RELEASE_VERSION }}
          load: true

      - name: Save Docker image as artifact
        run: |
          docker save mimirons-goldomatic-backend:${{ env.RELEASE_VERSION }} -o backend-image.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-docker-image
          path: backend-image.tar
          retention-days: 7

  create-release:
    runs-on: ubuntu-latest
    needs: [build-desktop, build-wowaddon, build-twitch-extension, build-backend-docker]
    steps:
      - name: Checkout (full history for release notes)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve RELEASE_VERSION
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || '' }}
        run: |
          set -e
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "$INPUT_VERSION" ]; then
            V="${INPUT_VERSION#v}"
            echo "RELEASE_VERSION=v${V}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_VERSION=v0.0.${{ github.run_number }}" >> "$GITHUB_ENV"
          fi

      # docker/build-push-action + Buildx register a hidden artifact (e.g. *~*.dockerbuild).
      # "Download all" pulls that too and extract often fails after 5 retries — filter explicitly.
      - name: Download ZIP artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: "*-release"
          merge-multiple: true

      - name: Download Backend Docker image tarball
        uses: actions/download-artifact@v4
        with:
          name: backend-docker-image
          path: release-assets/backend-docker-image

      # ZIPs are flat under release-assets/; backend-image.tar is under release-assets/backend-docker-image/
      - name: Collect ZIPs, Docker tar, checksums, and release notes
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p upload
          find release-assets -type f -name '*.zip' -print0 | while IFS= read -r -d '' f; do
            base="$(basename "$f")"
            cp -f "$f" "upload/${base}"
          done
          zip_count="$(find upload -maxdepth 1 -name '*.zip' | wc -l)"
          zip_count="${zip_count//[[:space:]]/}"
          if [ "${zip_count:-0}" -lt 1 ]; then
            echo "No ZIP artifacts found under release-assets"
            find release-assets -type f || true
            exit 1
          fi
          TAR="$(find release-assets -type f -name 'backend-image.tar' | head -n1)"
          if [ -z "${TAR}" ]; then
            echo "::error::backend-image.tar not found (expected under release-assets/backend-docker-image/ after download)"
            find release-assets -type f || true
            exit 1
          fi
          cp -f "${TAR}" upload/backend-image.tar
          (cd upload && sha256sum *.zip backend-image.tar > SHA256SUMS.txt)
          PREV_TAG="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          NOTES_FILE="${GITHUB_WORKSPACE}/release-notes.md"
          {
            echo "## Changes"
            echo ""
            if [ -n "${PREV_TAG}" ]; then
              git log --pretty=format:'- %s (%h)' "${PREV_TAG}..HEAD" || true
            else
              git log --pretty=format:'- %s (%h)' -n 50 || true
            fi
            echo ""
            echo "## Artifacts"
            echo ""
            echo "ZIP bundles (Desktop, WoW addon, Twitch Extension), Backend container image (\`backend-image.tar\`), and \`SHA256SUMS.txt\` are attached. The same image is pushed to GHCR."
          } > "${NOTES_FILE}"
          echo "NOTES_FILE=${NOTES_FILE}" >> "${GITHUB_ENV}"

      - name: Load Docker image from tar
        run: |
          set -euo pipefail
          docker load -i upload/backend-image.tar

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Backend image to GHCR
        run: |
          REPO="${{ needs.build-backend-docker.outputs.image_repo }}"
          docker tag mimirons-goldomatic-backend:${{ env.RELEASE_VERSION }} \
            "${REPO}:${{ env.RELEASE_VERSION }}"
          docker push "${REPO}:${{ env.RELEASE_VERSION }}"

          docker tag mimirons-goldomatic-backend:${{ env.RELEASE_VERSION }} \
            "${REPO}:latest"
          docker push "${REPO}:latest"

      # GHCR defaults to private. Avoid list ?package_type=container (can return 400 Invalid argument for some orgs).
      # Resolve package via GET .../packages/{container|docker}/{name}, then PATCH the same path segment as package_type.
      - name: Make Backend GHCR package public via API
        run: |
          set -euo pipefail
          OWNER="${{ github.repository_owner }}"
          WANT="mimirons-goldomatic-backend"
          TOKEN="${{ secrets.GITHUB_TOKEN }}"
          API="https://api.github.com"
          API_VERSION="2022-11-28"
          HDR=(-H "Authorization: Bearer ${TOKEN}" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: ${API_VERSION}")

          enc() { python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1], safe=\"\"))" "$1"; }

          OWNER_TYPE="$(curl -sS "${HDR[@]}" "${API}/users/${OWNER}" | jq -r .type)"
          echo "Owner ${OWNER} account type: ${OWNER_TYPE}"

          PACKAGE_TYPE=""
          PKG_NAME=""
          ENC_WANT="$(enc "${WANT}")"

          # Try direct GET (works for private org packages with packages:read/write); try container then docker.
          if [ "${OWNER_TYPE}" = "Organization" ]; then
            for PT in container docker; do
              code="$(curl -sS -w "%{http_code}" -o /tmp/gh_pkg_probe.json \
                "${HDR[@]}" \
                "${API}/orgs/${OWNER}/packages/${PT}/${ENC_WANT}")"
              if [ "${code}" = "200" ]; then
                PACKAGE_TYPE="${PT}"
                PKG_NAME="$(jq -r .name /tmp/gh_pkg_probe.json)"
                echo "Resolved via GET: package_type=${PACKAGE_TYPE} name=${PKG_NAME}"
                break
              fi
            done
            if [ -z "${PACKAGE_TYPE}" ]; then
              for PT in docker container; do
                list_http="$(curl -sS -w "%{http_code}" -o /tmp/gh_pkg_list.json \
                  "${HDR[@]}" \
                  "${API}/orgs/${OWNER}/packages?package_type=${PT}&per_page=100")"
                if [ "${list_http}" != "200" ]; then
                  echo "::warning::List org packages package_type=${PT} HTTP ${list_http}"
                  cat /tmp/gh_pkg_list.json || true
                  continue
                fi
                PKG_NAME="$(jq -r --arg w "${WANT}" '
                  [.[] | select(.name == $w or (.name | endswith("/" + $w)) or (.name | contains($w))) | .name] | .[0] // empty
                ' /tmp/gh_pkg_list.json)"
                if [ -n "${PKG_NAME}" ] && [ "${PKG_NAME}" != "null" ]; then
                  PACKAGE_TYPE="${PT}"
                  echo "Resolved via list: package_type=${PACKAGE_TYPE} name=${PKG_NAME}"
                  break
                fi
              done
            fi
          else
            for PT in container docker; do
              code="$(curl -sS -w "%{http_code}" -o /tmp/gh_pkg_probe.json \
                "${HDR[@]}" \
                "${API}/user/packages/${PT}/${ENC_WANT}")"
              if [ "${code}" = "200" ]; then
                PACKAGE_TYPE="${PT}"
                PKG_NAME="$(jq -r .name /tmp/gh_pkg_probe.json)"
                echo "Resolved via GET /user/packages: package_type=${PACKAGE_TYPE} name=${PKG_NAME}"
                break
              fi
            done
            if [ -z "${PACKAGE_TYPE}" ]; then
              for PT in container docker; do
                code="$(curl -sS -w "%{http_code}" -o /tmp/gh_pkg_probe.json \
                  "${HDR[@]}" \
                  "${API}/users/${OWNER}/packages/${PT}/${ENC_WANT}")"
                if [ "${code}" = "200" ]; then
                  PACKAGE_TYPE="${PT}"
                  PKG_NAME="$(jq -r .name /tmp/gh_pkg_probe.json)"
                  echo "Resolved via GET /users/.../packages: package_type=${PACKAGE_TYPE} name=${PKG_NAME}"
                  break
                fi
              done
            fi
            if [ -z "${PACKAGE_TYPE}" ]; then
              for PT in docker container; do
                list_http="$(curl -sS -w "%{http_code}" -o /tmp/gh_pkg_list.json \
                  "${HDR[@]}" \
                  "${API}/users/${OWNER}/packages?package_type=${PT}&per_page=100")"
                if [ "${list_http}" != "200" ]; then
                  echo "::warning::List user packages package_type=${PT} HTTP ${list_http}"
                  cat /tmp/gh_pkg_list.json || true
                  continue
                fi
                PKG_NAME="$(jq -r --arg w "${WANT}" '
                  [.[] | select(.name == $w or (.name | endswith("/" + $w)) or (.name | contains($w))) | .name] | .[0] // empty
                ' /tmp/gh_pkg_list.json)"
                if [ -n "${PKG_NAME}" ] && [ "${PKG_NAME}" != "null" ]; then
                  PACKAGE_TYPE="${PT}"
                  echo "Resolved via list: package_type=${PACKAGE_TYPE} name=${PKG_NAME}"
                  break
                fi
              done
            fi
          fi

          if [ -z "${PACKAGE_TYPE}" ] || [ -z "${PKG_NAME}" ]; then
            echo "::error::Could not resolve GHCR package ${WANT} (GET and list failed). Check packages: permissions and image name."
            exit 1
          fi

          ENC_PKG="$(enc "${PKG_NAME}")"
          if [ "${OWNER_TYPE}" = "Organization" ]; then
            PATCH_URL="${API}/orgs/${OWNER}/packages/${PACKAGE_TYPE}/${ENC_PKG}"
          else
            PATCH_URL="${API}/user/packages/${PACKAGE_TYPE}/${ENC_PKG}"
          fi
          echo "PATCH ${PATCH_URL}"

          HTTP="$(curl -sS -w "%{http_code}" -o /tmp/gh_pkg_patch.json \
            -X PATCH \
            "${HDR[@]}" \
            -d '{"visibility":"public"}' \
            "${PATCH_URL}")"

          if [ "${HTTP}" = "200" ] || [ "${HTTP}" = "204" ]; then
            echo "GHCR package set to public (HTTP ${HTTP})."
            exit 0
          fi

          echo "::error::PATCH failed HTTP ${HTTP}"
          cat /tmp/gh_pkg_patch.json
          exit 1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ env.RELEASE_VERSION }}
          name: ${{ env.RELEASE_VERSION }}
          body_path: ${{ env.NOTES_FILE }}
          files: |
            upload/*.zip
            upload/SHA256SUMS.txt
          fail_on_unmatched_files: true
          generate_release_notes: false
